<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Pro Flipbook Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #2c3e50; font-family: sans-serif; }
        #app-container { display: flex; flex-direction: column; width: 100%; height: 100vh; position: relative; }
        .viewport-wrapper { flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: auto; position: relative; padding: 20px; }
        .flipbook-container { display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transform-origin: center center; transition: transform 0.2s ease; }
        .page-custom { background-color: white; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        canvas { width: 100% !important; height: 100% !important; object-fit: contain; }
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: none; z-index: 40; justify-content: center; align-items: center; font-size: 20px; transition: background 0.3s; }
        .nav-arrow:hover { background: rgba(0,0,0,0.9); }
        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }
        .share-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 100; width: 300px; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="bg-gray-900 text-white p-3 flex justify-between items-center shadow-md z-50">
        <div class="flex items-center gap-3">
            <label id="upload-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded text-sm font-semibold cursor-pointer flex items-center gap-2">
                <i class="fa-solid fa-file-upload"></i> PDF અપલોડ કરો
                <input type="file" id="pdf-input" accept=".pdf" class="hidden">
            </label>
            <span id="page-num" class="text-sm bg-gray-800 px-3 py-1 rounded hidden">પેજ: 0 / 0</span>
        </div>

        <div class="flex items-center gap-4 text-lg">
            <button id="btn-zoom-in" class="hover:text-blue-400 p-1 hidden" title="ઝૂમ ઇન"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
            <button id="btn-zoom-out" class="hover:text-blue-400 p-1 hidden" title="ઝૂમ આઉટ"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
            <button id="btn-sound" class="text-green-400 hover:text-green-500 p-1" title="અવાજ બંધ/ચાલુ"><i class="fa-solid fa-volume-high"></i></button>
            <button id="btn-share" class="hover:text-blue-400 p-1 hidden" title="શેર કરો"><i class="fa-solid fa-share-nodes"></i></button>
            <button id="btn-fullscreen" class="hover:text-blue-400 p-1" title="આખી સ્ક્રીન"><i class="fa-solid fa-expand"></i></button>
        </div>
    </div>

    <div class="viewport-wrapper" id="viewport">
        <button id="prev-btn" class="nav-arrow arrow-left"><i class="fa-solid fa-chevron-left"></i></button>
        <button id="next-btn" class="nav-arrow arrow-right"><i class="fa-solid fa-chevron-right"></i></button>

        <div id="loading" class="text-white text-xl hidden flex flex-col items-center gap-3">
            <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-400"></i>
            <span>ફ્લિપબુક તૈયાર થઈ રહી છે, કૃપા કરીને રાહ જુઓ...</span>
        </div>

        <div id="flipbook" class="flipbook-container"></div>
    </div>

    <div id="share-modal" class="share-modal text-gray-800">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h3 class="font-bold text-md">લિંક શેર કરો</h3>
            <button id="close-share" class="text-gray-500 hover:text-gray-700 text-xl">&times;</button>
        </div>
        <div class="flex gap-2 mb-4">
            <input type="text" id="share-url" class="border p-2 text-xs rounded w-full bg-gray-50" readonly>
            <button id="btn-copy" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-xs whitespace-nowrap">Copy</button>
        </div>
        <div class="flex justify-around text-2xl text-blue-600">
            <a id="share-wa" target="_blank" class="hover:text-green-500 cursor-pointer"><i class="fa-brands fa-whatsapp"></i></a>
            <a id="share-fb" target="_blank" class="hover:text-blue-800 cursor-pointer"><i class="fa-brands fa-facebook"></i></a>
        </div>
    </div>
</div>

<audio id="flip-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let pageFlip = null;
    let pdfDoc = null;
    let currentZoom = 1;
    let isSoundOn = true;

    const pdfInput = document.getElementById('pdf-input');
    const flipbook = document.getElementById('flipbook');
    const loading = document.getElementById('loading');
    const pageNumDisplay = document.getElementById('page-num');
    const flipSound = document.getElementById('flip-sound');

    // Check URL parameters for direct PDF loading
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const pdfFile = urlParams.get('pdf');
        if (pdfFile) {
            document.getElementById('upload-btn').style.display = 'none';
            loadPDF(pdfFile);
        }
    });

    pdfInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const fileURL = URL.createObjectURL(file);
            loadPDF(fileURL);
        }
    });

    async function loadPDF(url) {
        loading.style.display = 'flex';
        flipbook.style.display = 'none';
        flipbook.innerHTML = '';
        if(pageFlip) { try { pageFlip.destroy(); } catch(e){} }

        try {
            pdfDoc = await pdfjsLib.getDocument(url).promise;
            const totalPages = pdfDoc.numPages;

            // Generate HTML structure for each page
            for (let i = 1; i <= totalPages; i++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page-custom';
                const canvas = document.createElement('canvas');
                pageDiv.appendChild(canvas);
                flipbook.appendChild(pageDiv);
                
                await renderPage(i, canvas);
            }

            loading.style.display = 'none';
            flipbook.style.display = 'block';

            // Initialize PageFlip library
            initFlipbook();
            showToolbarElements();

        } catch (error) {
            alert('PDF લોડ કરવામાં ભૂલ આવી: ' + error.message);
            loading.style.display = 'none';
        }
    }

    async function renderPage(pageNo, canvas) {
        const page = await pdfDoc.getPage(pageNo);
        const viewport = page.getViewport({ scale: 1.5 });
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport: viewport }).promise;
    }

    function initFlipbook() {
        const width = flipbook.querySelector('canvas').width / 1.5;
        const height = flipbook.querySelector('canvas').height / 1.5;

        pageFlip = new St.PageFlip(flipbook, {
            width: width,
            height: height,
            size: "stretch",
            minWidth: 300,
            maxWidth: 1000,
            minHeight: 400,
            maxHeight: 1400,
            drawShadow: true,
            maxShadowOpacity: 0.5,
            showCover: true
        });

        pageFlip.loadFromHTML(flipbook.querySelectorAll('.page-custom'));

        // Update page counter and play sound on flip
        updatePageCounter();
        pageFlip.on('flip', (e) => {
            if (isSoundOn) { flipSound.currentTime = 0; flipSound.play(); }
            updatePageCounter();
        });

        document.getElementById('prev-btn').style.display = 'flex';
        document.getElementById('next-btn').style.display = 'flex';
    }

    function updatePageCounter() {
        if(!pageFlip) return;
        const current = pageFlip.getCurrentPageIndex() + 1;
        const total = pdfDoc.numPages;
        pageNumDisplay.innerText = `પેજ: ${current} / ${total}`;
    }

    function showToolbarElements() {
        pageNumDisplay.style.display = 'inline-block';
        document.getElementById('btn-zoom-in').style.display = 'inline-block';
        document.getElementById('btn-zoom-out').style.display = 'inline-block';
        document.getElementById('btn-share').style.display = 'inline-block';
    }

    // Navigation Arrow Buttons Action
    document.getElementById('prev-btn').addEventListener('click', () => pageFlip && pageFlip.flipPrev());
    document.getElementById('next-btn').addEventListener('click', () => pageFlip && pageFlip.flipNext());

    // Zoom Functions
    document.getElementById('btn-zoom-in').addEventListener('click', () => {
        if (currentZoom < 2) {
            currentZoom += 0.2;
            flipbook.style.transform = `scale(${currentZoom})`;
        }
    });
    document.getElementById('btn-zoom-out').addEventListener('click', () => {
        if (currentZoom > 0.8) {
            currentZoom -= 0.2;
            flipbook.style.transform = `scale(${currentZoom})`;
        }
    });

    // Sound On/Off Button Action
    document.getElementById('btn-sound').addEventListener('click', function() {
        isSoundOn = !isSoundOn;
        this.innerHTML = isSoundOn ? '<i class="fa-solid fa-volume-high"></i>' : '<i class="fa-solid fa-volume-xmark text-red-500"></i>';
    });

    // Fullscreen Feature
    document.getElementById('btn-fullscreen').addEventListener('click', () => {
        const el = document.getElementById('app-container');
        if (!document.fullscreenElement) {
            el.requestFullscreen().catch(err => alert(err.message));
        } else {
            document.exitFullscreen();
        }
    });

    // Share & Copy Link Management
    const shareModal = document.getElementById('share-modal');
    document.getElementById('btn-share').addEventListener('click', () => {
        shareModal.style.display = 'block';
        const currentUrl = window.location.href;
        document.getElementById('share-url').value = currentUrl;
        document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=આ ફ્લિપબુક જુઓ: ${encodeURIComponent(currentUrl)}`;
        document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentUrl)}`;
    });

    document.getElementById('close-share').addEventListener('click', () => shareModal.style.display = 'none');
    document.getElementById('btn-copy').addEventListener('click', () => {
        const copyText = document.getElementById('share-url');
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        alert('લિંક કોપી થઈ ગઈ છે!');
    });
</script>

</body>
</html>
